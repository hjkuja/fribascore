name: API CI

on:
  push:
    branches: [ main ]
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'api/**'
      - '.github/workflows/api.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 #v4
        with:
          dotnet-version: '10.x'
          cache: 'nuget'
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore fribascore.slnx --locked-mode

      - name: Build
        run: dotnet build fribascore.slnx --no-restore -c Release

      - name: Test
        run: dotnet test fribascore.slnx --no-build -c Release
